<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国独立开发者项目列表</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17;
  --bg2: #1a1932;
  --bg3: #232347;
  --green: #41ff7a;
  --yellow: #ffcd75;
  --red: #ff6b6b;
  --cyan: #7fdbff;
  --pink: #ff79c6;
  --text: #fffffe;
  --text2: #a7a9be;
  --pixel: 4px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'ZCOOL QingKe HuangYou', sans-serif;
  min-height: 100vh;
  image-rendering: pixelated;
  overflow-x: hidden;
}

.pixel-border {
  border: var(--pixel) solid var(--green);
  box-shadow:
    inset var(--pixel) var(--pixel) 0 0 rgba(65,255,122,0.15),
    inset -var(--pixel) -var(--pixel) 0 0 rgba(65,255,122,0.15);
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

.stars {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: -1;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--text);
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

header {
  padding: 48px 20px 32px;
  text-align: center;
  position: relative;
}

h1 {
  font-family: 'ZCOOL QingKe HuangYou', sans-serif;
  font-size: clamp(24px, 5vw, 42px);
  color: var(--green);
  text-shadow: 0 0 10px rgba(65,255,122,0.5), 4px 4px 0 #0a3d1a;
  letter-spacing: 4px;
  margin-bottom: 12px;
}
.subtitle {
  font-size: clamp(14px, 2.5vw, 18px);
  color: var(--text2);
  margin-bottom: 8px;
}
.subtitle a {
  color: var(--cyan);
  text-decoration: none;
}
.subtitle a:hover {
  color: var(--green);
  text-decoration: underline;
}

.cursor-blink {
  display: inline-block;
  width: 12px; height: 20px;
  background: var(--green);
  margin-left: 4px;
  vertical-align: middle;
  animation: blink 1s step-end infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.stats-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 16px;
  padding: 16px 20px;
  max-width: 900px;
  margin: 0 auto;
}
.stat-item {
  background: var(--bg2);
  padding: 12px 20px;
  text-align: center;
  position: relative;
}
.stat-item .stat-num {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(16px, 3vw, 24px);
  color: var(--green);
  display: block;
  margin-bottom: 4px;
}
.stat-item .stat-label {
  font-size: 13px;
  color: var(--text2);
}
.stat-item.yellow .stat-num { color: var(--yellow); }
.stat-item.red .stat-num { color: var(--red); }
.stat-item.cyan .stat-num { color: var(--cyan); }

.controls {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}
.search-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  padding: 12px 16px 12px 44px;
  background: var(--bg2);
  border: var(--pixel) solid var(--green);
  color: var(--text);
  font-family: 'ZCOOL QingKe HuangYou', sans-serif;
  font-size: 16px;
  outline: none;
  box-shadow: inset var(--pixel) var(--pixel) 0 0 rgba(65,255,122,0.1);
}
.search-wrap input:focus {
  border-color: var(--yellow);
  box-shadow: inset var(--pixel) var(--pixel) 0 0 rgba(255,205,117,0.1), 0 0 12px rgba(255,205,117,0.2);
}
.search-wrap input::placeholder { color: var(--text2); }
.search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}
.search-icon svg { width: 18px; height: 18px; fill: var(--green); }

.filter-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 8px 16px;
  background: var(--bg2);
  border: var(--pixel) solid var(--text2);
  color: var(--text2);
  font-family: 'ZCOOL QingKe HuangYou', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--green); color: var(--green); }
.filter-btn.active { background: var(--green); border-color: var(--green); color: var(--bg); }

.cat-btns {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.cat-btn {
  padding: 6px 12px;
  background: var(--bg3);
  border: 2px solid var(--text2);
  color: var(--text2);
  font-family: 'ZCOOL QingKe HuangYou', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.cat-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.cat-btn.active { background: var(--cyan); border-color: var(--cyan); color: var(--bg); }

.projects-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 40px;
}

.project-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.project-card {
  background: var(--bg2);
  position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
  animation: cardAppear 0.3s ease-out both;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
  overflow: hidden;
}
.project-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 6px 0 var(--green), 0 8px 20px rgba(65,255,122,0.15);
  z-index: 2;
}
@keyframes cardAppear {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 2px dashed rgba(167,169,190,0.15);
}
.status-dot {
  width: 10px; height: 10px;
  flex-shrink: 0;
}
.status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.developing { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 1.5s ease-in-out infinite; }
.status-dot.offline { background: var(--red); opacity: 0.5; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.card-name {
  font-size: 17px;
  font-weight: bold;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.card-category {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 3px 8px;
  background: var(--bg3);
  color: var(--pink);
  white-space: nowrap;
  flex-shrink: 0;
}

.card-body {
  padding: 12px 16px 14px;
}
.card-desc {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: rgba(167,169,190,0.6);
}
.card-author {
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-author-dot {
  width: 8px; height: 8px;
  background: var(--cyan);
  flex-shrink: 0;
}
.card-author a {
  color: var(--cyan);
  text-decoration: none;
}
.card-author a:hover { text-decoration: underline; }
.card-date {
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-date-dot {
  width: 8px; height: 8px;
  background: var(--yellow);
  flex-shrink: 0;
}

.project-card::before {
  content: '';
  display: block;
  height: 4px;
  background: var(--green);
}
.project-card[data-status="developing"]::before { background: var(--yellow); }
.project-card[data-status="offline"]::before { background: var(--red); }

.loading-screen {
  text-align: center;
  padding: 80px 20px;
}
.loading-text {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--green);
  animation: blink 1s step-end infinite;
}
.loading-bar-wrap {
  max-width: 300px;
  margin: 20px auto 0;
  height: 16px;
  background: var(--bg2);
  border: var(--pixel) solid var(--green);
}
.loading-bar {
  height: 100%;
  background: var(--green);
  width: 0%;
  animation: loadBar 2s ease-in-out infinite;
}
@keyframes loadBar {
  0% { width: 0%; }
  50% { width: 70%; }
  100% { width: 100%; }
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}
.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.pagination {
  text-align: center;
  padding: 32px 20px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.page-btn {
  padding: 10px 16px;
  background: var(--bg2);
  border: var(--pixel) solid var(--text2);
  color: var(--text2);
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.page-btn:hover { border-color: var(--green); color: var(--green); }
.page-btn.active { background: var(--green); border-color: var(--green); color: var(--bg); }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-btn.ellipsis { cursor: default; border-color: var(--bg3); }

footer {
  text-align: center;
  padding: 32px 20px;
  border-top: var(--pixel) solid var(--bg3);
  color: var(--text2);
  font-size: 13px;
}
footer a { color: var(--cyan); text-decoration: none; }
footer a:hover { color: var(--green); }
.pixel-heart {
  color: var(--red);
  display: inline-block;
  animation: heartbeat 1.2s ease-in-out infinite;
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

.back-top {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 44px; height: 44px;
  background: var(--bg2);
  border: var(--pixel) solid var(--green);
  color: var(--green);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 100;
}
.back-top.show { opacity: 1; }
.back-top:hover { background: var(--green); color: var(--bg); }

@media (max-width: 600px) {
  .project-list { grid-template-columns: 1fr; }
  .stats-bar { gap: 8px; }
  .stat-item { padding: 8px 12px; }
  .controls { flex-direction: column; }
  .search-wrap { min-width: 100%; }
  h1 { letter-spacing: 2px; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <h1>> 中国独立开发者项目列表_<span class="cursor-blink"></span></h1>
  <p class="subtitle">聚合所有中国独立开发者的项目 · <a href="https://github.com/xianyu110/chinese-independent-developer" target="_blank">GitHub</a></p>
  <p class="subtitle" style="margin-top:4px;font-size:13px;">
    <a href="./README-Programmer-Edition.md">程序员版面</a> · <a href="./README-Game.md">游戏版面</a>
  </p>
</header>

<div class="stats-bar" id="stats">
  <div class="stat-item pixel-border">
    <span class="stat-num" id="stat-total">--</span>
    <span class="stat-label">总项目</span>
  </div>
  <div class="stat-item">
    <span class="stat-num" id="stat-online">--</span>
    <span class="stat-label">已上线</span>
  </div>
  <div class="stat-item yellow">
    <span class="stat-num" id="stat-dev">--</span>
    <span class="stat-label">开发中</span>
  </div>
  <div class="stat-item red">
    <span class="stat-num" id="stat-off">--</span>
    <span class="stat-label">已关闭</span>
  </div>
  <div class="stat-item cyan">
    <span class="stat-num" id="stat-authors">--</span>
    <span class="stat-label">开发者</span>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </span>
    <input type="text" id="search" placeholder="搜索项目名称或描述..." autocomplete="off">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="online">已上线</button>
    <button class="filter-btn" data-filter="developing">开发中</button>
    <button class="filter-btn" data-filter="offline">已关闭</button>
  </div>
</div>

<div class="cat-btns" id="catBtns"></div>

<div class="projects-container">
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-text">LOADING...</div>
    <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  </div>
  <div class="project-list" id="projectList" style="display:none;"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">(x_x)</div>
    <p>没有找到匹配的项目</p>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<footer>
  <p style="margin-top:8px;">用 <span class="pixel-heart">&#9829;</span> 和像素构建</p>
  <p style="margin-top:12px;font-size:14px;color:var(--text);">Made by <a href="https://mp.weixin.qq.com/s?__biz=MzI0MjEwNTI5NQ==&mid=2247483694&idx=1&sn=maynorai" target="_blank" style="color:var(--green);text-decoration:none;">MaynorAI</a> · 公众号 MaynorAI</p>
  <p style="margin-top:8px;color:rgba(167,169,190,0.5);font-size:12px;" id="lastUpdate">最后更新：加载中...</p>
</footer>

<button class="back-top" id="backTop" title="回到顶部">&#9650;</button>

<script>
const PER_PAGE = 48;

const CATEGORIES = {
  'AI': ['AI', 'ai', 'LLM', 'GPT', 'ChatGPT', 'Claude', '模型', '智能', '机器学习', '深度学习', '大模型', 'Agent', 'agent'],
  '工具': ['工具', '管理', '助手', '转换', '下载', '解析', '计算', '编辑', '压缩', '格式', '生成器'],
  '社交': ['社交', '聊天', '社区', '论坛', '交友', '消息', '推送', '通知'],
  '设计': ['设计', 'UI', '图标', '壁纸', '配色', '字体', '素材', '模板', '绘画', '画'],
  '开发': ['API', 'SDK', '开发', '编程', '代码', '部署', '服务器', '框架', '开源', 'CLI', '终端', 'Docker', 'Git'],
  '媒体': ['视频', '音乐', '音频', '播客', '播放', '媒体', '直播', '动画', '漫画', '翻��'],
  '效率': ['笔记', '日历', '待办', '任务', '计划', '效率', '时间', '提醒', '自动化', 'OCR'],
  '教育': ['学习', '教育', '课程', '题', '考试', '知识', '阅读', '书籍'],
  '游戏': ['游戏', 'Game', 'game'],
  '金融': ['支付', '交易', '财务', '记账', '钱包', '价格', '股票', '基金'],
  '生活': ['生活', '健康', '运动', '饮食', '天气', '地图', '旅游', '出行'],
};

let allProjects = [];
let filteredProjects = [];
let currentPage = 1;
let currentFilter = 'all';
let currentCategory = 'all';
let currentSearch = '';

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

document.addEventListener('DOMContentLoaded', async () => {
  createStars();
  setupEvents();
  try {
    const resp = await fetch('projects.json');
    allProjects = await resp.json();
    document.getElementById('loadingScreen').style.display = 'none';
    updateStats();
    buildCategoryButtons();
    applyFilters();
  } catch (e) {
    document.getElementById('loadingScreen').innerHTML =
      '<div class="loading-text" style="color:var(--red);">FAILED TO LOAD DATA</div>';
  }
});

function createStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    c.appendChild(s);
  }
}

function setupEvents() {
  document.getElementById('search').addEventListener('input', debounce(e => {
    currentSearch = e.target.value.trim();
    currentPage = 1;
    applyFilters();
  }, 200));

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      currentPage = 1;
      applyFilters();
    });
  });

  document.getElementById('backTop').addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  window.addEventListener('scroll', () => {
    document.getElementById('backTop').classList.toggle('show', window.scrollY > 400);
  });
}

function detectCategory(project) {
  const text = (project.name + ' ' + project.description).toLowerCase();
  for (const [cat, keywords] of Object.entries(CATEGORIES)) {
    for (const kw of keywords) {
      if (text.includes(kw.toLowerCase())) return cat;
    }
  }
  return '其他';
}

function buildCategoryButtons() {
  const counts = {};
  allProjects.forEach(p => {
    const cat = detectCategory(p);
    counts[cat] = (counts[cat] || 0) + 1;
  });

  const container = document.getElementById('catBtns');
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active';
  allBtn.textContent = '全部 (' + allProjects.length + ')';
  allBtn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    currentCategory = 'all';
    currentPage = 1;
    applyFilters();
  });
  container.appendChild(allBtn);

  sorted.forEach(([cat, count]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = cat + ' (' + count + ')';
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCategory = cat;
      currentPage = 1;
      applyFilters();
    });
    container.appendChild(btn);
  });
}

function applyFilters() {
  filteredProjects = allProjects.filter(p => {
    if (currentFilter !== 'all' && p.status !== currentFilter) return false;
    if (currentCategory !== 'all' && detectCategory(p) !== currentCategory) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      if (!p.name.toLowerCase().includes(q) && !p.description.toLowerCase().includes(q) && !p.author.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  renderProjects();
  renderPagination();
}

function renderProjects() {
  const container = document.getElementById('projectList');
  const emptyState = document.getElementById('emptyState');

  if (filteredProjects.length === 0) {
    container.style.display = 'none';
    emptyState.style.display = 'block';
    return;
  }

  container.style.display = 'grid';
  emptyState.style.display = 'none';
  container.innerHTML = '';

  const start = (currentPage - 1) * PER_PAGE;
  const pageProjects = filteredProjects.slice(start, start + PER_PAGE);

  const frag = document.createDocumentFragment();

  pageProjects.forEach((p, i) => {
    const card = document.createElement('a');
    card.className = 'project-card pixel-border';
    card.href = p.url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.dataset.status = p.status;
    card.style.animationDelay = (i * 0.02) + 's';

    const cat = detectCategory(p);

    const header = document.createElement('div');
    header.className = 'card-header';

    const dot = document.createElement('span');
    dot.className = 'status-dot ' + p.status;
    header.appendChild(dot);

    const name = document.createElement('span');
    name.className = 'card-name';
    name.textContent = p.name;
    name.title = p.name;
    header.appendChild(name);

    const catEl = document.createElement('span');
    catEl.className = 'card-category';
    catEl.textContent = cat;
    header.appendChild(catEl);

    const body = document.createElement('div');
    body.className = 'card-body';

    const desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.textContent = p.description || '暂无描述';
    body.appendChild(desc);

    const meta = document.createElement('div');
    meta.className = 'card-meta';

    if (p.author) {
      const authorEl = document.createElement('span');
      authorEl.className = 'card-author';
      const authorDot = document.createElement('span');
      authorDot.className = 'card-author-dot';
      authorEl.appendChild(authorDot);
      if (p.authorGithub) {
        const authorLink = document.createElement('a');
        authorLink.href = p.authorGithub;
        authorLink.target = '_blank';
        authorLink.rel = 'noopener noreferrer';
        authorLink.textContent = p.author;
        authorLink.addEventListener('click', e => e.stopPropagation());
        authorEl.appendChild(authorLink);
      } else {
        authorEl.appendChild(document.createTextNode(p.author));
      }
      meta.appendChild(authorEl);
    }

    if (p.date) {
      const dateEl = document.createElement('span');
      dateEl.className = 'card-date';
      const dateDot = document.createElement('span');
      dateDot.className = 'card-date-dot';
      dateEl.appendChild(dateDot);
      dateEl.appendChild(document.createTextNode(p.date.replace('添加', '')));
      meta.appendChild(dateEl);
    }

    body.appendChild(meta);
    card.appendChild(header);
    card.appendChild(body);
    frag.appendChild(card);
  });

  container.appendChild(frag);
}

function renderPagination() {
  const container = document.getElementById('pagination');
  const totalPages = Math.ceil(filteredProjects.length / PER_PAGE);
  container.innerHTML = '';

  if (totalPages <= 1) return;

  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.textContent = '<';
  prev.disabled = currentPage === 1;
  prev.addEventListener('click', () => goPage(currentPage - 1));
  container.appendChild(prev);

  getPageRange(currentPage, totalPages).forEach(p => {
    if (p === '...') {
      const el = document.createElement('span');
      el.className = 'page-btn ellipsis';
      el.textContent = '...';
      container.appendChild(el);
    } else {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
      btn.textContent = p;
      btn.addEventListener('click', () => goPage(p));
      container.appendChild(btn);
    }
  });

  const next = document.createElement('button');
  next.className = 'page-btn';
  next.textContent = '>';
  next.disabled = currentPage === totalPages;
  next.addEventListener('click', () => goPage(currentPage + 1));
  container.appendChild(next);
}

function getPageRange(current, total) {
  if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
  if (current <= 3) return [1, 2, 3, 4, '...', total];
  if (current >= total - 2) return [1, '...', total - 3, total - 2, total - 1, total];
  return [1, '...', current - 1, current, current + 1, '...', total];
}

function goPage(page) {
  const totalPages = Math.ceil(filteredProjects.length / PER_PAGE);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderProjects();
  renderPagination();
  document.getElementById('projectList').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateStats() {
  const online = allProjects.filter(p => p.status === 'online').length;
  const dev = allProjects.filter(p => p.status === 'developing').length;
  const off = allProjects.filter(p => p.status === 'offline').length;
  const authors = new Set(allProjects.map(p => p.author).filter(Boolean)).size;

  animateNumber('stat-total', allProjects.length);
  animateNumber('stat-online', online);
  animateNumber('stat-dev', dev);
  animateNumber('stat-off', off);
  animateNumber('stat-authors', authors);

  const latestDate = allProjects.length > 0 ? allProjects[0].date : '';
  if (latestDate) {
    document.getElementById('lastUpdate').textContent = '最后更新：' + latestDate;
  }
}

function animateNumber(id, target) {
  const el = document.getElementById(id);
  let current = 0;
  const step = Math.max(1, Math.ceil(target / 40));
  const timer = setInterval(() => {
    current += step;
    if (current >= target) { current = target; clearInterval(timer); }
    el.textContent = current.toLocaleString();
  }, 30);
}

function debounce(fn, delay) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
}
</script>
