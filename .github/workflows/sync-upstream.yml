name: Sync Upstream

on:
  schedule:
    # 每天北京时间 10:00 检查一次（UTC 02:00）
    - cron: '0 2 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LOCAL_DEFAULT: master
      UPSTREAM_DEFAULT: upstream/master

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and sync
        run: |
          set -euo pipefail

          git checkout -B "$LOCAL_DEFAULT" "origin/$LOCAL_DEFAULT"
          git remote add upstream https://github.com/1c7/chinese-independent-developer.git 2>/dev/null || true
          git remote set-url upstream https://github.com/1c7/chinese-independent-developer.git
          git fetch upstream

          LOCAL_SHA=$(git rev-parse HEAD)
          UPSTREAM_SHA=$(git rev-parse "$UPSTREAM_DEFAULT")

          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
            echo "Already up to date."
            exit 0
          fi

          if git merge-base --is-ancestor "$UPSTREAM_DEFAULT" HEAD; then
            echo "Local branch already contains upstream."
            exit 0
          fi

          restore_path_from_head() {
            path="$1"
            if git cat-file -e "HEAD:$path" 2>/dev/null; then
              git checkout HEAD -- "$path"
              git add "$path"
            else
              git rm -rf --ignore-unmatch "$path"
            fi
          }

          resolve_conflict() {
            path="$1"
            side="$2"

            if ! git ls-files -u -- "$path" | grep -q .; then
              return 0
            fi

            echo "Resolving $path with $side version"
            if git checkout "--$side" -- "$path" 2>/dev/null; then
              git add "$path"
            else
              git rm -f --ignore-unmatch "$path"
            fi
          }

          keep_fork_workflows() {
            echo "Keeping fork-owned workflow files unchanged."
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              restore_path_from_head "$path"
            done < <(git diff --name-only --cached -- .github/workflows)

            while IFS= read -r path; do
              [ -n "$path" ] || continue
              restore_path_from_head "$path"
            done < <(git diff --name-only -- .github/workflows)
          }

          echo "New upstream commits found. Merging without committing first..."
          merge_status=0
          git merge "$UPSTREAM_DEFAULT" --no-edit --no-commit -X theirs || merge_status=$?

          if [ "$merge_status" -ne 0 ]; then
            echo "Merge conflicts found. Resolving known fork-owned files with local versions."

            for path in               .github/scripts/generate_projects_json.py               CNAME               index.html               projects.json               _config.yml
            do
              resolve_conflict "$path" ours
            done

            while IFS= read -r path; do
              [ -n "$path" ] || continue
              case "$path" in
                .github/workflows/*) resolve_conflict "$path" ours ;;
              esac
            done < <(git diff --name-only --diff-filter=U)

            echo "Resolving remaining conflicts with upstream versions."
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              resolve_conflict "$path" theirs
            done < <(git diff --name-only --diff-filter=U)

            if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
              echo "Unresolved conflicts remain:"
              git diff --name-only --diff-filter=U
              exit 1
            fi
          fi

          keep_fork_workflows

          if git diff --cached --quiet; then
            echo "No upstream changes to commit after applying fork-owned exclusions."
            git merge --abort 2>/dev/null || true
            exit 0
          fi

          git commit --no-edit

      - name: Regenerate projects.json
        run: python3 .github/scripts/generate_projects_json.py

      - name: Commit generated data
        run: |
          if git diff --quiet -- projects.json; then
            echo "projects.json is up to date."
            exit 0
          fi

          git add projects.json
          git commit -m "chore: refresh projects data"

      - name: Push changes
        run: git push origin HEAD:$LOCAL_DEFAULT
